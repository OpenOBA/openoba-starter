  <text x="790" y="450" fill="#94a3b8" font-size="8"><tspan fill="#a78bfa" font-weight="600">Relation</tspan> — 关联关系声明 · <tspan fill="#a78bfa" font-weight="600">Rule</tspan> — 校验/触发/计算规则</text>
  <text x="790" y="464" fill="#94a3b8" font-size="8"><tspan fill="#a78bfa" font-weight="600">Alias</tspan> — 别名→语义→物理列三向翻译 · <tspan fill="#a78bfa" font-weight="600">Action</tspan> — 可执行操作与参数约束</text>

