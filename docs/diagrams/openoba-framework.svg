  <text x="95" y="172" text-anchor="middle" fill="#475569" font-size="9">自然语言理解</text>
  <text x="95" y="192" text-anchor="middle" fill="#475569" font-size="9">任务规划</text>
  <text x="95" y="212" text-anchor="middle" fill="#475569" font-size="9">代码生成</text>
