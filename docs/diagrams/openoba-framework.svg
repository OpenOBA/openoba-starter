  <text x="240" y="91" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" letter-spacing="1">OpenOBA</text>
  <text x="284" y="92" fill="#e2e8f0" font-size="14" font-weight="700">AI 数字执行官 · 执行引擎</text>
  <text x="284" y="106" fill="#64748b" font-size="9">基于五项发明专利的确定性执行架构</text>

