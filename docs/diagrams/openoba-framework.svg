  <text x="450" y="458" text-anchor="middle" fill="#94a3b8" font-size="9">YAML 超集协议 · 五层语义模型 · 确定性执行的前提</text>
  <line x1="770" y1="428" x2="770" y2="472" stroke="#a78bfa33"/>
